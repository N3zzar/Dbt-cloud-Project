version: 2

models:
  - name: mart_customer
    description: "Aggregated customer-level metrics including purchase behavior, revenue, order counts, and customer lifetime."
    columns:
      - name: customer_id
        description: "Primary key referencing the customer dimension."
        tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('dim_customer')
                field: customer_id
      - name: customer_city
        description: "City of the customer."

      - name: customer_state
        description: "State of the customer."

      - name: customer_zip_code
        description: "Postal code of the customer."

      - name: first_order_date
        description: "Date of the customer's first order."
        tests:
          - not_null

      - name: last_order_date
        description: "Date of the customer's most recent order."

      - name: total_orders
        description: "Total number of orders placed by the customer."
        tests:
          - not_null

      - name: total_items_purchased
        description: "Total number of items purchased by the customer."

      - name: total_revenue
        description: "Total revenue generated by the customer."
        tests:
          - not_null

      - name: customer_lifetime_days
        description: "Number of days between the first and last order."

      - name: is_repeat_customer
        description: "Boolean indicating whether the customer has placed more than one order."

      - name: avg_order_value
        description: "Average revenue per order for the customer."

    config:
      meta:
        owner: "data-analytics"
        domain: "customer"
        tags: ["mart", "customer"]

        metrics:

          total_customers:
            label: Total Customers
            type: count_distinct
            sql: customer_id
            description: Distinct count of customers.

          repeat_customers:
            label: Repeat Customers
            type: count_distinct
            sql: |
              case
                when ${TABLE}.is_repeat_customer = true
                then ${TABLE}.customer_id
              end
            description: Customers who have placed more than one delivered order.

          repeat_customer_rate:
            label: Repeat Customer Rate
            type: number
            sql: ${repeat_customers} / nullif(${total_customers}, 0)
            format: '0.0%'
            description: Percentage of customers who are repeat purchasers.

          customer_revenue:
            label: Customer Revenue
            type: sum
            sql: total_revenue
            description: Total revenue generated across all customers.

          avg_revenue_per_customer:
            label: Average Revenue Per Customer
            type: average
            sql: total_revenue
            format: '$#,##0.00'
            description: Average revenue generated per customer.

          total_delivered_orders:
            label: Total Orders
            type: sum
            sql: total_orders
            description: Total delivered orders placed by customers.

          avg_orders_per_customer:
            label: Average Orders Per Customer
            type: average
            sql: total_orders
            description: Average number of delivered orders per customer.

          total_delivered_items_purchased:
            label: Total Items Purchased
            type: sum
            sql: total_items_purchased
            description: Total items purchased across all customers.

          avg_items_per_customer:
            label: Average Items Per Customer
            type: average
            sql: total_items_purchased
            description: Average number of items purchased per customer.

          customer_lifetime_value:
            label: Customer Lifetime Value
            type: average
            sql: total_revenue
            format: '$#,##0.00'
            description: Average customer lifetime revenue.

          avg_customer_lifespan:
            label: Average Customer Lifespan (Days)
            type: average
            sql: customer_lifetime_days
            description: Average number of days between first and most recent purchase.

          max_customer_lifetime:
            label: Maximum Customer Lifetime (Days)
            type: max
            sql: customer_lifetime_days
            description: Longest observed customer lifespan.

          repeat_customer_revenue:
            label: Repeat Customer Revenue
            type: sum
            sql: |
              case
                when ${TABLE}.is_repeat_customer = true
                then ${TABLE}.total_revenue
                else 0
              end
            description: Revenue generated by repeat customers.

          avg_delivered_order_value:
            label: Average Order Value
            type: average
            sql: avg_order_value
            format: '$#,##0.00'
            description: Average revenue per delivered order.

          highest_customer_revenue:
            label: Highest Customer Revenue
            type: max
            sql: total_revenue
            format: '$#,##0.00'
            description: Revenue generated by the highest-spending customer.



  - name: mart_sales
    description: "Order-level sales fact table with aggregated metrics including delivery performance, payment details, and order counts."
    columns:
      - name: order_id
        description: "Primary key for each order."
        tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('fct_orders')
                field: order_id
      - name: customer_id
        description: "Foreign key referencing dim_customer."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customer')
                field: customer_id

      - name: customer_city
        description: "City name"

      - name: customer_state
        description: "State of the customer"

      - name: customer_state_abbrev
        description: "The full state name"

      - name: order_purchase_timestamp
        description: "Timestamp when the order was purchased."

      - name: order_status
        description: "Status of the order (e.g., approved, delivered, canceled)."
        tests:
          - accepted_values:
              arguments:
                values: ["approved", "delivered", "unavailable", "invoiced", "processing", "shipped", "created", "canceled"]

      - name: total_order_value
        description: "Total value of the order including all items."
        tests:
          - not_null

      - name: total_items
        description: "Number of items in the order."
        tests:
          - not_null

      - name: delivery_days
        description: "Actual delivery duration in days (delivered_customer_date - purchase date)."

      - name: estimated_delivery_days
        description: "Estimated delivery duration in days (estimated_delivery_date - purchase date)."

      - name: is_delivered_on_time
        description: "Boolean indicating if the order was delivered on or before the estimated delivery date."

      - name: is_delayed
        description: "Boolean indicating if the order was delivered after the estimated delivery date."

    config:
      meta:
        owner: "data-analytics"
        domain: "sales"
        tags: ["mart", "sales"]
        metrics:
          total_orders:
            label: Total Orders
            type: count_distinct
            sql: order_id
            description: Total delivered orders.

          total_customers:
            label: Total Customers
            type: count_distinct
            sql: customer_id
            description: Distinct customers placing delivered orders.

          total_revenue:
            label: Total Revenue
            type: sum
            sql: total_order_value
            format: '$#,##0.00'
            description: Revenue generated from delivered orders.

          average_order_value:
            label: Average Order Value
            type: average
            sql: total_order_value
            format: '$#,##0.00'
            description: Average value of delivered orders.

          highest_order_value:
            label: Highest Order Value
            type: max
            sql: total_order_value
            format: '$#,##0.00'
            description: Largest delivered order value.

          total_items_sold:
            label: Total Items Sold
            type: sum
            sql: total_items
            description: Total quantity of items sold.

          average_items_per_order:
            label: Average Items Per Order
            type: average
            sql: total_items
            description: Average basket size.

          average_delivery_days:
            label: Average Delivery Days
            type: average
            sql: delivery_days
            description: Average time taken to deliver an order.

          max_delivery_days:
            label: Maximum Delivery Days
            type: max
            sql: delivery_days
            description: Longest observed delivery duration.

          average_estimated_delivery_days:
            label: Average Estimated Delivery Days
            type: average
            sql: estimated_delivery_days
            description: Average promised delivery duration.

          on_time_orders:
            label: On-Time Orders
            type: count
            sql: |
              case
                when ${TABLE}.is_delivered_on_time = true
                then 1
              end
            description: Orders delivered on or before promised date.

          delayed_orders:
            label: Delayed Orders
            type: count
            sql: |
              case
              when ${TABLE}.is_delayed = true
              then 1
              end
            description: Orders delivered after the promised date.

          on_time_delivery_rate:
            label: On-Time Delivery Rate
            type: number
            sql: ${on_time_orders} / nullif(${total_orders},0)
            format: '0.0%'
            description: Percentage of orders delivered on time.

          delayed_order_rate:
            label: Delayed Order Rate
            type: number
            sql: ${delayed_orders} / nullif(${total_orders},0)
            format: '0.0%'
            description: Percentage of delayed orders.

          revenue_per_customer:
            label: Revenue Per Customer
            type: number
            sql: ${total_revenue} / nullif(${total_customers},0)
            format: '$#,##0.00'
            description: Average revenue generated per customer.

          orders_per_customer:
            label: Orders Per Customer
            type: number
            sql: ${total_orders} / nullif(${total_customers},0)
            description: Average orders placed per customer.


  - name: mart_product_performance
    description: |
      "Product-level performance mart with one row per product.

      This model aggregates delivered order item transactions to provide
      a consolidated analytical view of product sales performance,
      revenue generation, freight contribution, and product ranking."

    columns:
      - name: product_id
        description: |
          Unique identifier for the product.
          Represents the business key used to track product-level
          transactions across order items and downstream marts.
        tests:
          - not_null
          - unique

      - name: product_category_name_english
        description: |
          English-translated product category name.

          Used for category-level aggregation, benchmarking,
          and merchandising analysis
        tests:
          - not_null:
              config:
                severity: warn


      - name: total_orders
        description: |
          Total number of distinct delivered orders containing the product.

          This metric measures order penetration rather than unit volume.

      - name: units_sold
        description: |
          Total count of delivered order item rows associated with the product.

          Represents transactional sales volume at the order-item grain.

      - name: product_revenue
        description: |
          Gross product revenue generated from delivered orders.

          Calculated as the sum of product price excluding freight charges.

          Formula:
            SUM(price)

      - name: total_freight
        description: |
          Total freight charges associated with delivered product sales.

          Represents logistics-related revenue contribution.

      - name: total_value
        description: |
          Combined commercial value generated by the product,
          including both product price and freight charges.

      - name: avg_price
        description: |
          Average selling price of the product across delivered order items.

          Does not account for promotions, refunds,
          or temporal price fluctuations.

      - name: revenue_rank
        description: |
          Revenue ranking of products based on descending total_value.

          Calculated dynamically using a window ranking function.

          Lower rank values indicate higher-performing products.

      - name: category_rank
        description: Category ranking of products based on descending total_value partitioned by product_category

    config:
      meta:
        owner: "data-analytics"
        domain: "sales"
        tags: ["mart", "sales"]
        metrics:
          total_products:
            label: Total Products
            type: count_distinct
            sql: product_id
            description: Distinct products sold.

          total_orders:
            label: Product Orders
            type: sum
            sql: total_orders
            description: Total delivered orders containing products.

          total_units_sold:
            label: Units Sold
            type: sum
            sql: total_items
            description: Total units sold across products.

          total_product_revenue:
            label: Product Revenue
            type: sum
            sql: product_revenue
            format: '$#,##0.00'
            description: Revenue generated from product sales excluding freight.

          total_freight_revenue:
            label: Freight Revenue
            type: sum
            sql: total_freight
            format: '$#,##0.00'
            description: Freight charges associated with product sales.

          total_sales_value:
            label: Total Sales Value
            type: sum
            sql: total_value
            format: '$#,##0.00'
            description: Combined product and freight revenue.

          average_product_price:
            label: Average Product Price
            type: average
            sql: avg_price
            format: '$#,##0.00'
            description: Average selling price across products.

          average_units_per_product:
            label: Average Units Per Product
            type: average
            sql: total_items
            description: Average units sold per product.

          average_orders_per_product:
            label: Average Orders Per Product
            type: average
            sql: total_orders
            description: Average order penetration per product.

          highest_product_revenue:
            label: Highest Product Revenue
            type: max
            sql: product_revenue
            format: '$#,##0.00'
            description: Revenue generated by the highest-performing product.

          highest_total_value:
            label: Highest Total Value
            type: max
            sql: total_value
            format: '$#,##0.00'
            description: Maximum total value generated by a product.

          top_ranked_product:
            label: Best Product Rank
            type: min
            sql: revenue_rank
            description: Highest-performing product rank.

          average_product_rank:
            label: Average Product Rank
            type: average
            sql: revenue_rank
            description: Average revenue ranking across products.

          revenue_per_order:
            label: Revenue Per Order
            type: number
            sql: ${total_product_revenue} / nullif(${total_orders},0)
            format: '$#,##0.00'
            description: Average revenue generated per order.

          revenue_per_unit:
            label: Revenue Per Unit
            type: number
            sql: ${total_product_revenue} / nullif(${total_units_sold},0)
            format: '$#,##0.00'
            description: Average revenue generated per unit sold.