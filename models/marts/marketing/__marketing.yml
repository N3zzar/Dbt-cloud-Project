version: 2

models:
  - name: customer_cohorts
    description: "Customer cohort analysis table tracking retention and revenue performance over time by acquisition cohort."

    columns:
      - name: cohort_month
        description: "Month of the customer's first delivered order used for cohort assignment."
        tests:
          - not_null

      - name: order_month
        description: "Month in which the customer placed an order."
        tests:
          - not_null

      - name: num_customers
        description: "Number of customers present for each cohort month"

      - name: months_since_first_order
        description: "Number of months elapsed since the customer's first purchase."
        tests:
          - not_null

      - name: customers
        description: "Number of unique customers active in the cohort during the given order month."
        tests:
          - not_null

      - name: revenue
        description: "Total revenue generated by customers within the cohort during the order month."
        tests:
          - not_null

      - name: retention_rate
        description: "Percentage of customers retained relative to the original cohort size."

    config:
      meta:
        owner: "data-marketing"
        domain: "marketing"
        tags:
          - mart
          - marketing
          - cohorts
          - retention
        metrics:
          active_customers:
            label: Active Customers
            type: sum
            sql: customers

          cohort_revenue:
            label: Cohort Revenue
            type: sum
            sql: revenue
            format: '$#,##0.00'

          avg_revenue_per_customer:
            label: Revenue Per Customer
            type: number
            sql: ${cohort_revenue} / nullif(${active_customers},0)
            format: '$#,##0.00'

          max_cohort_revenue:
            label: Highest Cohort Revenue
            type: max
            sql: revenue
            format: '$#,##0.00'

          avg_months_since_acquisition:
            label: Avg Months Since Acquisition
            type: average
            sql: months_since_first_order

          retention_rate%:
            label: Retention_Rate
            type: average
            sql: retention_rate
            format: '0.0%'


  - name: customer_rfm_scores
    description: "Customer-level RFM segmentation model containing recency, frequency, monetary metrics, and behavioral segments."

    columns:
      - name: customer_id
        description: "Unique customer identifier."
        tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('dim_customer')
                field: customer_id

      - name: recency_days
        description: "Number of days since the customer's most recent delivered order."
        tests:
          - not_null

      - name: frequency
        description: "Total number of delivered orders placed by the customer."
        tests:
          - not_null

      - name: monetary
        description: "Total revenue generated from delivered orders by the customer."
        tests:
          - not_null

      - name: recency_score
        description: "Recency percentile score from 1-5 where 5 represents the most recent customers."
        tests:
          - not_null

      - name: frequency_score
        description: "Frequency percentile score from 1-5 where 5 represents the most frequent customers."
        tests:
          - not_null

      - name: monetary_score
        description: "Monetary percentile score from 1-5 where 5 represents the highest spending customers."
        tests:
          - not_null

      - name: rfm_score
        description: "Combined RFM score created by concatenating recency, frequency, and monetary scores."

      - name: customer_segment
        description: "Business-defined customer segment derived from RFM scoring logic."

      - name: customer_lifespan_days
        description: "Number of days between the customer's first and most recent delivered orders."

      - name: avg_order_value
        description: "Average revenue generated per delivered order."

    config:
      
      meta:
        owner: "data-marketing"
        domain: "marketing"
        tags:
        - mart
        - marketing
        - rfm
        - customer_analytics
        metrics:
          total_customers:
            label: Total Customers
            type: count_distinct
            sql: customer_id
            description: Distinct customers included in RFM analysis.

          total_orders:
            label: Total Orders
            type: sum
            sql: frequency
            description: Total delivered orders across customers.

          total_customer_revenue:
            label: Total Customer Revenue
            type: sum
            sql: monetary
            format: '$#,##0.00'
            description: Total revenue generated by customers.

          average_customer_revenue:
            label: Average Customer Revenue
            type: average
            sql: monetary
            format: '$#,##0.00'
            description: Average revenue per customer.

          average_frequency:
            label: Average Purchase Frequency
            type: average
            sql: frequency
            description: Average delivered orders per customer.

          average_recency_days:
            label: Average Recency (Days)
            type: average
            sql: recency_days
            description: Average number of days since last purchase.

          average_customer_lifespan:
            label: Average Customer Lifespan
            type: average
            sql: customer_lifespan_days
            description: Average lifespan of customers in days.

          average_order_value:
            label: Average Order Value
            type: average
            sql: avg_order_value
            format: '$#,##0.00'
            description: Average revenue per order.

          highest_customer_revenue:
            label: Highest Customer Revenue
            type: max
            sql: monetary
            format: '$#,##0.00'
            description: Revenue generated by the highest-value customer.

          highest_frequency:
            label: Highest Purchase Frequency
            type: max
            sql: frequency
            description: Maximum orders placed by a customer.
          champions:
            label: Champions
            type: count_distinct
            sql: |
              case
                when ${TABLE}.customer_segment = 'champions'
                then ${TABLE}.customer_id
              end

          loyal_customers:
            label: Loyal Customers
            type: count_distinct
            sql: |
              case
                when ${TABLE}.customer_segment = 'loyal_customers'
                then ${TABLE}.customer_id
              end

          at_risk_customers:
            label: At Risk Customers
            type: count_distinct
            sql: |
              case
                when ${TABLE}.customer_segment = 'at_risk'
                then ${TABLE}.customer_id
              end

          other_customers:
            label: Other Customers
            type: count_distinct
            sql: |
              case
                when ${TABLE}.customer_segment = 'others'
                then ${TABLE}.customer_id
              end
          champion_rate:
            label: Champion Rate
            type: number
            sql: ${champions} / nullif(${total_customers},0)
            format: '0.0%'

          loyal_customer_rate:
            label: Loyal Customer Rate
            type: number
            sql: ${loyal_customers} / nullif(${total_customers},0)
            format: '0.0%'

          at_risk_rate:
            label: At Risk Rate
            type: number
            sql: ${at_risk_customers} / nullif(${total_customers},0)
            format: '0.0%'