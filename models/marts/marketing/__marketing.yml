version: 2

models:
  - name: customer_cohorts
    description: "Customer cohort analysis table tracking retention and revenue performance over time by acquisition cohort."

    columns:
      - name: cohort_month
        description: "Month of the customer's first delivered order used for cohort assignment."
        tests:
          - not_null

      - name: order_month
        description: "Month in which the customer placed an order."
        tests:
          - not_null

      - name: months_since_first_order
        description: "Number of months elapsed since the customer's first purchase."
        tests:
          - not_null

      - name: customers
        description: "Number of unique customers active in the cohort during the given order month."
        tests:
          - not_null

      - name: revenue
        description: "Total revenue generated by customers within the cohort during the order month."
        tests:
          - not_null

      - name: retention_rate
        description: "Percentage of customers retained relative to the original cohort size."

    config:
      meta:
        owner: "data-marketing"
        domain: "marketing"

      tags:
        - mart
        - marketing
        - cohorts
        - retention

  - name: customer_rfm_scores
    description: "Customer-level RFM segmentation model containing recency, frequency, monetary metrics, and behavioral segments."

    columns:
      - name: customer_id
        description: "Unique customer identifier."
        tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('dim_customer')
                field: customer_id

      - name: recency_days
        description: "Number of days since the customer's most recent delivered order."
        tests:
          - not_null

      - name: frequency
        description: "Total number of delivered orders placed by the customer."
        tests:
          - not_null

      - name: monetary
        description: "Total revenue generated from delivered orders by the customer."
        tests:
          - not_null

      - name: recency_score
        description: "Recency percentile score from 1-5 where 5 represents the most recent customers."
        tests:
          - not_null

      - name: frequency_score
        description: "Frequency percentile score from 1-5 where 5 represents the most frequent customers."
        tests:
          - not_null

      - name: monetary_score
        description: "Monetary percentile score from 1-5 where 5 represents the highest spending customers."
        tests:
          - not_null

      - name: rfm_score
        description: "Combined RFM score created by concatenating recency, frequency, and monetary scores."

      - name: customer_segment
        description: "Business-defined customer segment derived from RFM scoring logic."

      - name: customer_lifespan_days
        description: "Number of days between the customer's first and most recent delivered orders."

      - name: avg_order_value
        description: "Average revenue generated per delivered order."

    config:
      meta:
        owner: "data-marketing"
        domain: "marketing"

      tags:
        - mart
        - marketing
        - rfm
        - customer_analytics