metrics:

# =====================================================
# REVENUE METRICS
# =====================================================

  # -----------------------------------------------------
  # Core Revenue KPIs
  # -----------------------------------------------------

  - name: total_revenue
    label: Total Revenue

    description: >
      Gross revenue generated across all orders,
      including product price and freight charges.

      This metric includes all order statuses and is
      primarily intended for operational revenue analysis.

      For finalized business reporting, prefer
      delivered_revenue.

    type: simple

    type_params:
      measure: total_order_revenue

  - name: delivered_revenue
    label: Delivered Revenue

    description: >
      Revenue generated from successfully delivered orders only.

      Excludes canceled, unavailable, and non-fulfilled orders.

      Recommended primary KPI for executive and
      financial reporting.

    type: simple

    type_params:
      measure:
        name: total_order_revenue

    filter: |
      {{ Dimension('customer_order__order_status') }} = 'delivered'

    
  - name: product_revenue
    label: Product Revenue

    description: >
      Revenue generated from product sales excluding freight charges.

      Represents gross merchandise value attributable
      to product purchases only.

    type: simple

    type_params:
      measure:
        name: item_revenue

  - name: freight_revenue
    label: Freight Revenue

    description: >
      Revenue generated from freight and shipping charges.

      Useful for logistics cost analysis and shipping
      contribution reporting.

    type: simple

    type_params:
      measure:
        name: freight_revenue

  - name: total_product_value
    label: Total Product Value

    description: >
      Combined value of product sales and freight charges.

      Represents total transactional value at the
      order-item level.

    type: simple

    type_params:
      measure:
        name: total_item_value

  - name: total_payments_received
    label: Total Payments Received

    description: >
      Total payment value collected from customers.

      Payment totals may differ slightly from revenue metrics
      due to installments, adjustments, or payment processing behavior.

    type: simple

    type_params:
      measure:
        name: total_payment_value

  # -----------------------------------------------------
  # Revenue Efficiency Metrics
  # -----------------------------------------------------

  - name: average_order_value
    label: Average Order Value

    description: >
      Average revenue generated per delivered order.

      Calculated as:

        delivered_revenue / delivered_orders

      Commonly used to evaluate customer purchasing behavior,
      basket size trends, and monetization efficiency.

    type: derived

    type_params:
      expr: revenue / orders

      metrics:
        - name: delivered_revenue
          alias: revenue

        - name: total_orders
          alias: orders

  - name: revenue_per_item
    label: Revenue Per Item

    description: >
      Average transactional value generated per order item sold.

      Calculated as:

        total_product_value / units_sold

      Useful for product monetization and pricing analysis.

    type: derived

    type_params:
      expr: revenue / items

      metrics:
        - name: total_product_value
          alias: revenue

        - name: units_sold
          alias: items

# =====================================================
# FULFILLMENT METRICS
# =====================================================

  # -----------------------------------------------------
  # Delivery SLA Metrics
  # -----------------------------------------------------

  - name: avg_delivery_time
    label: Average Delivery Time

    description: >
      Average number of days between order purchase
      and successful customer delivery.

      Primary operational metric for evaluating
      logistics efficiency and fulfillment speed.

    type: simple

    type_params:
      measure:
        name: avg_delivery_days

  - name: avg_estimated_delivery_time
    label: Average Estimated Delivery Time

    description: >
      Average promised delivery duration in days
      at the time of purchase.

      Useful for comparing expected versus actual
      fulfillment performance.

    type: simple

    type_params:
      measure:
        name: avg_estimated_delivery_days

  # -----------------------------------------------------
  # Fulfillment Volume Metrics
  # -----------------------------------------------------

  - name: total_orders
    label: Total Orders

    description: >
      Total distinct customer orders across all statuses.

      Common foundational KPI used throughout
      operational and revenue reporting.

    type: simple

    type_params:
      measure:
        name: order_count

  - name: delayed_orders
    label: Delayed Orders

    description: >
      Total number of orders delivered after
      the estimated delivery date.

      Used to monitor fulfillment failures and SLA breaches.

    type: simple

    type_params:
      measure:
        name: delayed_orders

  - name: delivered_orders
    label: Delivered Orders

    type: simple

    type_params:
      measure:
        name: order_count

    filter: |
      {{ Dimension('customer_order__order_status') }} = 'delivered'



  - name: on_time_orders
    label: On-Time Orders

    description: >
      Total number of orders delivered on or before
      the estimated delivery date.

      Used to evaluate fulfillment reliability.

    type: simple

    type_params:
      measure:
        name: on_time_orders

  # -----------------------------------------------------
  # Fulfillment Ratio KPIs
  # -----------------------------------------------------

  - name: delivery_delay_rate
    label: Delivery Delay Rate

    description: >
      Percentage of orders delivered after
      the estimated delivery date.

      Primary operational KPI for measuring
      fulfillment delays and logistics performance risk.

    type: ratio

    type_params:
      numerator: delayed_orders
      denominator: total_orders

  - name: on_time_delivery_rate
    label: On-Time Delivery Rate

    description: >
      Percentage of orders delivered on or before
      the estimated delivery date.

      Primary fulfillment SLA metric used to monitor
      logistics and customer delivery performance.

    type: ratio

    type_params:
      numerator: on_time_orders
      denominator: total_orders

# =====================================================
# CUSTOMER METRICS
# =====================================================

  # -----------------------------------------------------
  # Customer Volume Metrics
  # -----------------------------------------------------

  - name: total_customers
    label: Total Customers

    description: >
      Distinct customers represented within the customer summary model.

      Serves as the foundational customer population metric
      for behavioral, retention, and lifecycle analysis.

    type: simple

    type_params:
      measure:
        name: customer_count

  - name: repeat_customers
    label: Repeat Customers

    description: >
      Total customers who have placed more than one order.

      Commonly used to evaluate customer loyalty
      and repeat purchasing behavior.

    type: simple

    type_params:
      measure:
        name: repeat_customers

  # -----------------------------------------------------
  # Customer Revenue Metrics
  # -----------------------------------------------------

  - name: total_customer_revenue
    label: total customer revenue

    description: >
      Total cumulative revenue generated by customers
      across delivered orders.

      Used as a proxy for long-term customer value
      and retention quality.

    type: simple

    type_params:
      measure:
        name: customer_total_revenue

  - name: customer_average_order_value
    label: Customer Average Order Value

    description: >
      Average order value calculated at the customer level.

      Useful for analyzing purchasing behavior
      and customer monetization patterns.

    type: simple

    type_params:
      measure:
        name: customer_avg_order_value

  # -----------------------------------------------------
  # Customer Behavioral Metrics
  # -----------------------------------------------------

  - name: avg_customer_lifetime_days
    label: Average Customer Lifetime Days

    description: >
      Average duration between a customers first
      and most recent delivered purchase.

      Used as a high-level customer longevity indicator.

    type: simple

    type_params:
      measure:
        name: avg_customer_lifespan

  - name: average_recency_days
    label: Average Recency Days

    description: >
      Average number of days since a customer
      most recent purchase.

      Lower values indicate more recently active customers.

    type: simple

    type_params:
      measure:
        name: recency

  - name: average_customer_order_value_rfm
    label: Average Customer Order Value (RFM)

    description: >
      Average order value calculated from the
      customer RFM model.

      Useful for customer segmentation and
      behavioral analysis.

    type: simple

    type_params:
      measure:
        name: avg_order_value


  # -----------------------------------------------------
  # Customer Ratio KPIs
  # -----------------------------------------------------
  - name: repeat_customer_rate

    label: Repeat Customer Rate

    description: >
      Percentage of customers who placed
      more than one order.

      Primary KPI used to evaluate customer retention
      and repeat purchasing behavior.

    type: ratio

    type_params:

      numerator: repeat_customers

      denominator: total_customers

# =====================================================
# RETENTION METRICS
# =====================================================

  # -----------------------------------------------------
  # Cohort Activity Metrics
  # -----------------------------------------------------

  - name: cohort_active_customers

    label: Cohort Active Customers

    description: >

      Number of active customers within a cohort period.

      Used to analyze retention behavior
      and repeat engagement across acquisition cohorts.

    type: simple

    type_params:
      measure:
        name: cohort_customers

  # -----------------------------------------------------
  # Cohort Revenue Metrics
  # -----------------------------------------------------

  - name: cohort_revenue

    label: Cohort Revenue

    description: >
      Revenue generated by customers within
      a specific cohort period.

      Useful for evaluating cohort monetization trends
      and long-term customer value.

    type: simple

    type_params:
      measure:
        name: cohort_revenue

  # -----------------------------------------------------
  # Retention Ratio Metrics
  # -----------------------------------------------------

  - name: retention_rate

    label: Retention Rate

    description: >
          Percentage of customers retained relative to the original cohort size.

          Calculated within the customer cohort model and used
          to analyze retention performance over time.

    type: simple

    type_params:
      measure: retention_rate

# =====================================================
# PRODUCT METRICS
# ====================================================

  # -----------------------------------------------------
  # Product Sales Metrics
  # -----------------------------------------------------

  - name: units_sold

    label: Units Sold

    description: >
      Total quantity of order items sold.

      Primary product volume metric used for
      product performance and category analysis.

    type: simple

    type_params:
      measure:
        name: units_sold

  # -----------------------------------------------------
  # Product Efficiency Metrics
  # -----------------------------------------------------

  - name: avg_product_price

    label: Average Product Price

    description: >
      Average product revenue generated per item sold.

      Calculated as:
        product_revenue / units_sold

      Useful for pricing analysis and product
      monetization benchmarking.

    type: derived

    type_params:
      expr: revenue / items

      metrics:
        - name: product_revenue
          alias: revenue

        - name: units_sold
          alias: items

  - name: avg_freight_per_item

    label: Average Freight Per Item

    description: >
      Average freight value charged per item sold.

      Useful for shipping cost analysis
      and logistics pricing evaluation.

    type: derived

    type_params:
      expr: freight / items
      metrics:
        - name: freight_revenue
          alias: freight

        - name: units_sold
          alias: items

# =====================================================
# MARKETING FUNNEL METRICS
# =====================================================

  # -----------------------------------------------------
  # Funnel Volume Metrics
  # -----------------------------------------------------
        
  - name: total_closed_deals
    label: Total Closed Deals
    description: >
      Total successfully closed marketing-qualified deals.

      Represents finalized seller acquisition outcomes.
    type: simple

    type_params:
      measure:
        name: closed_deals

  - name: total_sellers
    label: Total Sellers
    description: >
      Total sellers associated with successfully closed deals.

      Used for acquisition performance analysis
      and sales efficiency calculations.

    type: simple

    type_params:
      measure:
        name: seller_count

  # -----------------------------------------------------
  # Funnel Efficiency Metrics
  # -----------------------------------------------------
  - name: deals_per_seller
    label: Deals Per Seller
    description: >
      Average number of closed deals generated per seller.

      Calculated as:
        total_closed_deals / total_sellers

      Useful for evaluating sales acquisition efficiency.

    type: derived
    type_params:
      expr: deals / sellers
      metrics:
        - name: total_closed_deals
          alias: deals

        - name: total_sellers
          alias: sellers