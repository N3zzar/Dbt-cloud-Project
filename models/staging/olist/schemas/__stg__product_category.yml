version: 2

models:
  - name: stg__product_category_name
    description: "Table mapping Portuguese product category names to English."

    columns:
      - name: product_category_name_sk
        description: "Surrogate key for primary key purpose"
        tests:  
          - not_null
          - unique

      - name: product_category_name
        description: "Category name in Portuguese."
        tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('stg__product')
                field: product_category_name

      - name: product_category_name_english
        description: "Category name translated into English."
        tests:
          - unique
          - not_null