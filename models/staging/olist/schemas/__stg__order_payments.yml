version: 2

models:
  - name: stg__order_payments
    description: "Payment information for each order"

    columns:
      - name: payment_sk
        description: "Surrogate key to identify payment grain"
        tests:
          - not_null

      - name: order_id
        description: "Order tied to the payment."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg__orders')
                field: order_id

      - name: payment_type
        description: "Type of payment."
        tests:
          - accepted_values:
              arguments:
                values:
                  - 'boleto'
                  - 'credit_card'
                  - 'debit_card'
                  - 'voucher'
                  - 'not_defined'

      - name: no_of_installments
        description: "Number of installments selected by the customer."
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 25
                inclusive: true